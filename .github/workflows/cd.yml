name: CD

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SDK version to release (e.g., 0.3.0)'
        required: true
        type: string

permissions:
  contents: write  # Required for pushing tags and creating GitHub releases

jobs:
  release:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ ! "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Version must match format X.Y.Z (e.g., 1.2.3)"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set Version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "new_version=$INPUT_VERSION" >> $GITHUB_OUTPUT

      # Generate changelog from commits since last tag
      - name: Generate Changelog
        id: changelog
        run: |
          set +x
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found; using full history"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "Generating changelog since $PREVIOUS_TAG"
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          FEATURES=$(echo "$CHANGELOG" | grep -i "feat\|feature" || echo "")
          FIXES=$(echo "$CHANGELOG" | grep -i "fix\|bug" || echo "")
          IMPROVEMENTS=$(echo "$CHANGELOG" | grep -i "improve\|enhance\|refactor\|perf" || echo "")
          OTHERS=$(echo "$CHANGELOG" | grep -v -i "feat\|feature\|add\|fix\|bug\|issue\|improve\|enhance\|refactor\|perf" || echo "")

          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed in v${{ steps.version.outputs.new_version }}"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### New Features"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$IMPROVEMENTS" ]; then
              echo "### Improvements"
              echo "$IMPROVEMENTS"
              echo ""
            fi

            if [ -n "$OTHERS" ]; then
              echo "### Other Changes"
              echo "$OTHERS"
              echo ""
            fi

            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Update Podspec Version
        run: |
          sed -i '' "s/s.version.*=.*/s.version          = '${{ steps.version.outputs.new_version }}'/" Imprint.podspec
          git add Imprint.podspec
          git commit -m "Bump version to ${{ steps.version.outputs.new_version }}"
          git push origin HEAD

      - name: Create Git Tag
        run: |
          NEW_VERSION=${{ steps.version.outputs.new_version }}
          git tag $NEW_VERSION
          git push origin $NEW_VERSION

      - name: Publish to CocoaPods
        run: |
          pod trunk push Imprint.podspec --allow-warnings --silent

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Clean up
      - name: Clean up
        if: always()
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/Imprint-*
          rm -rf ~/Library/Caches/org.carthage.CarthageKit
          rm -rf ~/Library/Caches/CocoaPods